<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <title>pricing plans</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f5f5;
        margin: 0;

        display: flex;
        justify-content: center; /*horizontal center*/
        align-items: center; /*vertical center*/
        min-height: 100vh; /*full screen height*/
      }

      /*Header*/
      .header {
        text-align: centre;
        padding: 40px 20px 10px;
      }
      .header h1 {
        margin: 0;
      }
      .header p {
        color: #555;
      }
      */container*/ .pricing-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        padding: 40px 20px;
      }
      /*card*/
      .pricing-card {
        width: 280px;
        background: fff;
        box-shadow: 0 0 10px #ccc;
        padding: 20px;
        text-align: center;
        border-radius: 12px;
        transition: 0.3s;
        border: 1px solid #ddd; /*ADD THIS*/
      }

      .pricing-card:hover {
        transform: translateY(-5px);
        box-sizing: border-box;
      }
      /*Highlight*/
      .popular {
        border: 2px solid blue;
      }
      /*Title*/
      .title {
        font-size: 20px;
        color: greenyellow;
        background: #f0f0f0;
        padding: 8px;
        border-radius: 6px;
        margin-bottom: 10px;
      }
      /*price*/
      .price {
        font-size: 30px;
        margin: 15px 0;
        font-weight: bolder;
      }
      /*Features*/
      .features {
        list-style: none;
        padding: 0;
        margin: 20px 0;
      }
      .features li {
        margin: 10px 0;
      }
      /*Button*/
      .btn {
        background: blue;
        color: whitesmoke;
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        border: radius 6px;
        transition: 0.3s;
      }
      .btn:hover {
        background: darkblue;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Our Pricing plans</h1>
      <p>Choose a plan that fits your taste</p>
    </div>

    <div class="pricing-container">
      <!--Basic-->
      <div class="pricing-card">
        <div class="Title">Basic</div>
        <div class="price">$5/mo</div>
        <ul class="features">
          <li>1GB storage</li>
          <li>Basic support</li>
          <li>All core features</li>
        </ul>
        <button class="btn">Start Trial</button>
      </div>

      <!--Pro-->
      <div class="pricing-card popular">
        <div class="title">pro</div>
        <div class="price">$15/mo</div>
        <ul class="features">
          <li>10GB Storage</li>
          <li>Priority support</li>
          <li>Advanced Features</li>
        </ul>
        <button class="btn">Start Trial</button>
      </div>

      <!--premium-->
      <div class="pricing-card">
        <div class="title">premium</div>
        <div class="price">$25/mo</div>
        <ul class="features">
          <li>Unlimited storage</li>
          <li>24/7 Support</li>
          <li>All Features + Extras</li>
        </ul>
        <button class="btn">Start Trial</button>
      </div>
    </div>
  </body>
</html>
